services:
  faultend:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      - "traefik.http.services.faultend.loadbalancer.server.port=3000"

      - "traefik.http.middlewares.faultend-gzip.compress=true"
      - "traefik.http.middlewares.faultend-redirect-to-https.redirectscheme.scheme=https"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.faultend-http.entrypoints=http"
      - "traefik.http.routers.faultend-http.rule=Host(`faultend.com`) || HostRegexp(`^[a-z0-9-]+\\.faultend\\.com$`)"
      - "traefik.http.routers.faultend-http.middlewares=faultend-redirect-to-https"
      - "traefik.http.routers.faultend-http.service=faultend"

      # HTTPS root (requests wildcard cert)
      - "traefik.http.routers.faultend-root.entrypoints=https"
      - "traefik.http.routers.faultend-root.rule=Host(`faultend.com`)"
      - "traefik.http.routers.faultend-root.tls=true"
      - "traefik.http.routers.faultend-root.tls.certresolver=letsencrypt"
      - "traefik.http.routers.faultend-root.tls.domains[0].main=faultend.com"
      - "traefik.http.routers.faultend-root.tls.domains[0].sans=*.faultend.com"
      - "traefik.http.routers.faultend-root.middlewares=faultend-gzip"
      - "traefik.http.routers.faultend-root.service=faultend"

      # HTTPS wildcard subdomains (no {var:regex} syntax)
      - "traefik.http.routers.faultend-wildcard.entrypoints=https"
      - "traefik.http.routers.faultend-wildcard.rule=HostRegexp(`^[a-z0-9-]+\\.faultend\\.com$`)"
      - "traefik.http.routers.faultend-wildcard.tls=true"
      - "traefik.http.routers.faultend-wildcard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.faultend-wildcard.middlewares=faultend-gzip"
      - "traefik.http.routers.faultend-wildcard.service=faultend"

networks:
  coolify:
    external: true