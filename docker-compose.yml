services:
  faultend:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      # Service (backend)
      - "traefik.http.services.faultend.loadbalancer.server.port=3000"

      # Middlewares
      - "traefik.http.middlewares.faultend-gzip.compress=true"
      - "traefik.http.middlewares.faultend-redirect-to-https.redirectscheme.scheme=https"

      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.faultend-http.entrypoints=http"
      - "traefik.http.routers.faultend-http.rule=Host(`faultend.com`) || HostRegexp(`{subdomain:.+}.faultend.com`)"
      - "traefik.http.routers.faultend-http.middlewares=faultend-redirect-to-https"
      - "traefik.http.routers.faultend-http.service=faultend"

      # HTTPS router (main)
      - "traefik.http.routers.faultend-https.entrypoints=https"
      - "traefik.http.routers.faultend-https.rule=Host(`faultend.com`) || HostRegexp(`{subdomain:.+}.faultend.com`)"
      - "traefik.http.routers.faultend-https.tls=true"
      - "traefik.http.routers.faultend-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.faultend-https.tls.domains[0].main=faultend.com"
      - "traefik.http.routers.faultend-https.tls.domains[0].sans=*.faultend.com"
      - "traefik.http.routers.faultend-https.middlewares=faultend-gzip"
      - "traefik.http.routers.faultend-https.service=faultend"

      # TEMP: exact-host router to prove routing works for a subdomain
      # Remove after testing.
      - "traefik.http.routers.faultend-test.entrypoints=https"
      - "traefik.http.routers.faultend-test.rule=Host(`test123.faultend.com`)"
      - "traefik.http.routers.faultend-test.tls=true"
      - "traefik.http.routers.faultend-test.service=faultend"

networks:
  coolify:
    external: true