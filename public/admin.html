<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Faultend</title>
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

  <!-- Fonts (self-hosted) -->
  <link rel="stylesheet" href="/fonts/fonts.css">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/drawer.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <a href="/" class="logo-link">
      <img src="/img/faultend.svg" alt="faultend" class="logo">
      <span class="brand">faultend</span>
    </a>
    <div class="top-bar-spacer"></div>
    <div class="top-bar-right">
      <button id="themeToggleBtn" class="btn-icon" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
      <a href="/" class="btn-ghost btn-sm" title="Back to app">← App</a>
      <button id="profileBtn" class="profile-btn" title="Profile" aria-label="Profile" style="display: none;"></button>
    </div>
  </header>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <div class="admin-layout">
    <div class="admin-container">

      <!-- User list view -->
      <div id="userListView">
        <div class="admin-toolbar">
          <input
            id="searchInput"
            type="text"
            class="input"
            placeholder="Filter users…"
            autocomplete="off"
          >
          <span id="adminStatLabel" class="admin-stat"></span>
        </div>

        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Plan</th>
                <th>Servers</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <tr><td colspan="5" class="admin-empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- User detail view (hidden by default) -->
      <div id="userDetailView" style="display: none;">
        <div class="detail-back">
          <button id="backBtn" class="btn-ghost btn-sm">← Back to users</button>
        </div>
        <div class="detail-header">
          <h2 id="detailName"></h2>
          <div id="detailEmail" class="detail-email"></div>
        </div>
        <div id="detailContent" class="detail-grid"></div>
      </div>

    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
