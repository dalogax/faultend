<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faultend</title>
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/drawer.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <a href="#" class="logo-link">
        <img src="/faultend.svg" alt="faultend" class="logo">
        <span class="brand">faultend</span>
      </a>
    </div>
    
    <div class="top-bar-center" id="serverInfo" style="display: none;">
      <span class="server-name"></span>
      <div class="server-url-container">
        <code class="server-url" id="serverUrl"></code>
        <button class="btn-icon copy-url-btn" id="copyUrlBtn" title="Copy URL">📋</button>
      </div>
    </div>
    
    <div class="top-bar-right">
      <div id="userDisplay" style="display: none; align-items: center; gap: 1rem;"></div>
      <button id="settingsBtn" class="btn-secondary" style="display: none;">Settings</button>
    </div>
  </header>

  <div id="loginOverlay" class="login-overlay" style="display: flex;">
    <div class="login-modal">
      <img src="/faultend.svg" alt="faultend" class="login-logo">
      <h1>faultend</h1>
      <p>Sign in to manage your fault servers</p>
      <a href="/auth/google" class="btn btn-primary login-btn">Sign in with Google</a>
      <div id="devLoginLink" style="margin-top: var(--space-lg); display: none;">
        <a href="/auth/dev-login" class="text-sm text-gray" style="text-decoration: underline;">Dev Login (local only)</a>
      </div>
      <script>
        // Only show dev login on localhost
        if (window.location.hostname === 'localhost' || window.location.hostname.endsWith('.localhost')) {
          document.getElementById('devLoginLink').style.display = 'block';
        }
      </script>
    </div>
  </div>

  <main id="mainContent" class="main-content" style="visibility: hidden;">
    <!-- Server List View -->
    <div id="serverListView" class="view active">
      <div class="view-header">
        <h2>Servers</h2>
        <button id="createServerBtn" class="btn">Create Server</button>
      </div>
      <div id="serverListContent">
        <p class="empty-state">Loading servers...</p>
      </div>
    </div>

    <!-- Server Management View (Traffic/Rules in 2 columns) -->
    <div id="serverManagementView" class="view" style="display: none;">
      <div class="two-column-layout">
        <!-- Traffic Column -->
        <div class="column" id="trafficView">
          <h2>Traffic</h2>
          <p class="empty-state">No traffic logs yet. Send requests through your fault server to see them here.</p>
        </div>

        <!-- Rules/Config Column -->
        <div class="column" id="rulesView">
          <div id="rules-content" class="column-content">
            <h2>Rules</h2>
            <p class="empty-state">No rules configured. Create rules to control how requests are handled.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Right-Side Drawer -->
  <div id="drawerOverlay" class="drawer-overlay"></div>
  <div id="drawer" class="drawer">
    <div class="drawer-header">
      <h2 id="drawerTitle" class="drawer-title"></h2>
    </div>
    <div id="drawerBody" class="drawer-body">
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- JavaScript Modules -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
